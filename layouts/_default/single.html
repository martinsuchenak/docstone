{{ define "main" }}
<article class="docs-layout container">
  {{ if .Params.toc | default true }}
  <aside class="docs-sidebar" aria-label="Table of contents">
    <h2 class="docs-nav-title">On this page</h2>
    {{ .TableOfContents }}
  </aside>

  {{/* Mobile TOC toggle */}}
  <div class="docs-toc-mobile">
    <button class="docs-toc-toggle" type="button" aria-expanded="false" aria-controls="docs-toc-mobile-content">
      On this page
      <svg aria-hidden="true" class="docs-toc-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <div id="docs-toc-mobile-content" class="docs-toc-mobile-content" hidden>
      {{ .TableOfContents }}
    </div>
  </div>
  {{ end }}

  <div class="docs-content">
    <h1>{{ .Title }}</h1>
    {{ if .Description }}
    <p class="docs-subtitle">{{ .Description }}</p>
    {{ end }}

    {{ .Content }}
  </div>
</article>
{{ end }}
