<footer class="site-footer" role="contentinfo">
  <div class="container">
    <div class="footer-bottom">
      <p class="footer-copyright">
        {{ with .Site.Params.footerText }}
          {{ . | markdownify }}
        {{ else }}
          &copy; {{ now.Year }} {{ .Site.Params.author | default "The authors" }}. Released under the <a href="https://opensource.org/licenses/MIT" target="_blank" rel="noopener noreferrer">MIT License</a>.
        {{ end }}
      </p>
    </div>
  </div>
</footer>
